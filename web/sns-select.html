<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNS選択 | InsightMasterforAndroid</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #eef4ff;
      --text: #142033;
      --muted: #61708a;
      --primary: #2f6bff;
      --primary-dark: #2157d8;
      --border: #d9e3f7;
      --shadow: 0 16px 40px rgba(28, 53, 107, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f7f9fd 0%, #eef4ff 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px 20px 120px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--primary-dark);
      font-weight: 800;
    }

    .back {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.92);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--primary-dark);
      text-decoration: none;
      font-size: 20px;
    }

    .hero, .card {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 24px 22px;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--primary);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.12;
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .card {
      padding: 18px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .sns-list {
      display: grid;
      gap: 12px;
    }

    .sns-option {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.12s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 22px rgba(25, 43, 84, 0.05);
    }

    .sns-option:active {
      transform: scale(0.995);
    }

    .sns-option.selected {
      border-color: var(--primary);
      box-shadow: 0 12px 30px rgba(47, 107, 255, 0.14);
      background: #f8fbff;
    }

    .sns-icon {
      width: 50px;
      height: 50px;
      border-radius: 18px;
      background: var(--surface-soft);
      display: grid;
      place-items: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .sns-meta {
      min-width: 0;
      flex: 1;
    }

    .sns-name {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .sns-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }

    .radio-mark {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 2px solid #b9c8ea;
      position: relative;
      flex-shrink: 0;
    }

    .sns-option.selected .radio-mark {
      border-color: var(--primary);
    }

    .sns-option.selected .radio-mark::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 999px;
      background: var(--primary);
    }

    .helper {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .primary-button {
      width: 100%;
      border: none;
      border-radius: 20px;
      padding: 18px 20px;
      background: linear-gradient(135deg, var(--primary) 0%, #4d86ff 100%);
      color: white;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.01em;
      cursor: pointer;
      box-shadow: 0 18px 30px rgba(47, 107, 255, 0.26);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .primary-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .status {
      min-height: 20px;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary-dark);
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(440px, calc(100vw - 20px));
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      padding: 10px 18px;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 12px 30px rgba(23, 41, 80, 0.12);
      border: 1px solid rgba(255,255,255,0.8);
    }

    .nav-item {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .nav-item.active { color: var(--primary-dark); }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <a class="back" href="./index.html" aria-label="ホームへ戻る">‹</a>
      <div>InsightMasterforAndroid</div>
    </div>

    <section class="hero">
      <div class="eyebrow">STEP 2</div>
      <h1>どのSNSの画面か、<br>選んでください。</h1>
      <p class="lead">初期版では Threads / Instagram / X に対応しています。あとから自動判定にも対応できる構成を想定しています。</p>
    </section>

    <section class="card">
      <h2 class="section-title">SNSを選択</h2>
      <div class="sns-list" id="snsList">
        <button class="sns-option" type="button" data-sns="Threads">
          <div class="sns-icon">＠</div>
          <div class="sns-meta">
            <div class="sns-name">Threads</div>
            <div class="sns-desc">投稿の反応や閲覧数など、テキスト中心のインサイト画面向けです。</div>
          </div>
          <div class="radio-mark" aria-hidden="true"></div>
        </button>

        <button class="sns-option" type="button" data-sns="Instagram">
          <div class="sns-icon">◉</div>
          <div class="sns-meta">
            <div class="sns-name">Instagram</div>
            <div class="sns-desc">投稿・リール・アカウント全体のインサイト画面を想定しています。</div>
          </div>
          <div class="radio-mark" aria-hidden="true"></div>
        </button>

        <button class="sns-option" type="button" data-sns="X">
          <div class="sns-icon">𝕏</div>
          <div class="sns-meta">
            <div class="sns-name">X</div>
            <div class="sns-desc">ポスト単位やアカウント分析の画面向けです。まずは主要指標の読取りを優先します。</div>
          </div>
          <div class="radio-mark" aria-hidden="true"></div>
        </button>
      </div>

      <div class="helper">迷ったら、スクリーンショットの見た目に一番近いSNSを選んでください。あとで修正しやすい設計にします。</div>
    </section>

    <section class="card">
      <div id="status" class="status">まだSNSは選択されていません。</div>
      <button id="nextButton" class="primary-button" type="button" disabled>数値抽出へ進む</button>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="メインナビゲーション">
    <div class="nav-item active">ホーム</div>
    <div class="nav-item">履歴</div>
    <div class="nav-item">設定</div>
  </nav>

  <script>
    const options = Array.from(document.querySelectorAll('.sns-option'));
    const status = document.getElementById('status');
    const nextButton = document.getElementById('nextButton');
    let selectedSns = '';

    options.forEach((option) => {
      option.addEventListener('click', () => {
        options.forEach((item) => item.classList.remove('selected'));
        option.classList.add('selected');
        selectedSns = option.dataset.sns;
        status.textContent = `${selectedSns} を選択しました。次へ進めます。`;
        nextButton.disabled = false;
      });
    });

    nextButton.addEventListener('click', () => {
      alert(`${selectedSns} の数値抽出UIは次のステップで実装します。`);
    });
  </script>
</body>
</html>
