<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR数値抽出 | InsightMasterforAndroid</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #eef4ff;
      --text: #142033;
      --muted: #61708a;
      --primary: #2f6bff;
      --primary-dark: #2157d8;
      --border: #d9e3f7;
      --success: #1f9d61;
      --danger: #c53d3d;
      --warning: #b7791f;
      --shadow: 0 16px 40px rgba(28, 53, 107, 0.12);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f7f9fd 0%, #eef4ff 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px 20px 120px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--primary-dark);
      font-weight: 800;
    }
    .back {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.92);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--primary-dark);
      text-decoration: none;
      font-size: 20px;
    }
    .hero, .card {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }
    .hero { padding: 24px 22px; }
    .card { padding: 18px; }
    .eyebrow {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--primary);
      margin-bottom: 10px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.14;
      letter-spacing: -0.04em;
    }
    .lead, .card-text {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .row {
      display: grid;
      gap: 12px;
    }
    .input, .textarea {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: white;
      padding: 14px 14px;
      font-size: 14px;
      color: var(--text);
    }
    .textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.6;
    }
    .primary-button, .secondary-button {
      width: 100%;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .primary-button {
      border: none;
      background: linear-gradient(135deg, var(--primary) 0%, #4d86ff 100%);
      color: white;
      box-shadow: 0 18px 30px rgba(47, 107, 255, 0.26);
    }
    .primary-button:disabled, .secondary-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }
    .secondary-button {
      border: 1px solid var(--border);
      background: white;
      color: var(--primary-dark);
    }
    .preview {
      display: none;
      gap: 14px;
      align-items: flex-start;
      padding: 14px;
      border-radius: 18px;
      background: #f8fbff;
      border: 1px solid var(--border);
    }
    .preview.active { display: flex; }
    .preview img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: white;
      flex-shrink: 0;
    }
    .preview-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .label {
      font-size: 12px;
      font-weight: 800;
      color: var(--primary-dark);
      margin-bottom: 6px;
    }
    .status {
      min-height: 20px;
      font-size: 13px;
      font-weight: 700;
    }
    .status.ok { color: var(--success); }
    .status.error { color: var(--danger); }
    .status.warn { color: var(--warning); }
    .grid-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #f8fbff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
    }
    .field-name {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .field-input {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      background: white;
    }
    .field-help {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }
    .helper {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(520px, calc(100vw - 20px));
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      padding: 10px 18px;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 12px 30px rgba(23, 41, 80, 0.12);
      border: 1px solid rgba(255,255,255,0.8);
    }
    .nav-item { text-align: center; font-size: 12px; color: var(--muted); font-weight: 700; }
    .nav-item.active { color: var(--primary-dark); }
    @media (max-width: 520px) {
      .grid-fields { grid-template-columns: 1fr; }
      .preview { flex-direction: column; }
      .preview img { width: 100%; height: auto; max-height: 240px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <a class="back" href="./sns-select.html" aria-label="SNS選択へ戻る">‹</a>
      <div>InsightMasterforAndroid</div>
    </div>

    <section class="hero">
      <div class="eyebrow">STEP 3</div>
      <h1>OCRで数値を読み取り、<br>あとで直せる形にします。</h1>
      <p class="lead">まずはスクリーンショットを選び、対象SNSを指定してOCRを実行します。抽出結果はあとで修正できます。</p>
    </section>

    <section class="card">
      <h2 class="section-title">1. 対象SNS</h2>
      <div class="row">
        <select id="snsSelect" class="input">
          <option value="Threads">Threads</option>
          <option value="Instagram">Instagram</option>
          <option value="X">X</option>
        </select>
        <div class="helper">初期版は手動選択です。将来的に自動判定に対応できるようにします。</div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">2. スクリーンショット</h2>
      <input id="fileInput" type="file" accept="image/png,image/jpeg,image/jpg" hidden />
      <button id="pickButton" class="secondary-button" type="button">画像を選択</button>
      <div class="preview" id="preview">
        <img id="previewImage" alt="選択したスクリーンショットのプレビュー" />
        <div class="preview-meta">
          <div id="previewName" style="font-weight:800;font-size:14px;word-break:break-all;"></div>
          <div id="previewInfo" class="helper"></div>
        </div>
      </div>
      <div id="pickStatus" class="status"></div>
    </section>

    <section class="card">
      <h2 class="section-title">3. OCR実行</h2>
      <button id="ocrButton" class="primary-button" type="button" disabled>OCRで数値を抽出する</button>
      <div id="ocrStatus" class="status"></div>
    </section>

    <section class="card">
      <h2 class="section-title">4. OCRテキスト</h2>
      <div class="label">読み取ったテキスト</div>
      <textarea id="ocrText" class="textarea" placeholder="ここにOCR結果が入ります"></textarea>
      <div class="helper">OCRの誤読がある場合は、ここを直接編集してから再抽出できます。</div>
      <button id="parseButton" class="secondary-button" type="button">このテキストから数値候補を再抽出</button>
    </section>

    <section class="card">
      <h2 class="section-title">5. 数値候補</h2>
      <div class="grid-fields" id="fields"></div>
      <div class="helper">未確定の項目は空欄のまま残ります。あとで分析前に修正できます。</div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="メインナビゲーション">
    <div class="nav-item active">ホーム</div>
    <div class="nav-item">履歴</div>
    <div class="nav-item">設定</div>
  </nav>

  <script>
    const fileInput = document.getElementById('fileInput');
    const pickButton = document.getElementById('pickButton');
    const preview = document.getElementById('preview');
    const previewImage = document.getElementById('previewImage');
    const previewName = document.getElementById('previewName');
    const previewInfo = document.getElementById('previewInfo');
    const pickStatus = document.getElementById('pickStatus');
    const ocrButton = document.getElementById('ocrButton');
    const ocrStatus = document.getElementById('ocrStatus');
    const ocrText = document.getElementById('ocrText');
    const parseButton = document.getElementById('parseButton');
    const fields = document.getElementById('fields');
    const snsSelect = document.getElementById('snsSelect');

    let selectedFile = null;

    const FIELD_LABELS = {
      views: '表示回数 / 閲覧数',
      likes: 'いいね',
      replies: '返信 / コメント',
      reposts: 'リポスト / 再投稿',
      quotes: '引用',
      bookmarks: '保存 / ブックマーク',
      shares: 'シェア',
      follows: 'フォロー',
      profileVisits: 'プロフィールアクセス',
      linkClicks: 'リンククリック'
    };

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function setStatus(target, message, type) {
      target.textContent = message || '';
      target.className = 'status' + (type ? ' ' + type : '');
    }

    function parseCompactNumber(raw) {
      if (!raw) return null;
      const value = String(raw).trim().replace(/,/g, '').toLowerCase();
      const match = value.match(/^(\d+(?:\.\d+)?)([km万億])?$/i);
      if (!match) {
        const numeric = Number(value.replace(/[^\d.]/g, ''));
        return Number.isFinite(numeric) ? Math.round(numeric) : null;
      }
      let num = Number(match[1]);
      const unit = match[2];
      if (!Number.isFinite(num)) return null;
      if (unit === 'k') num *= 1000;
      if (unit === 'm') num *= 1000000;
      if (unit === '万') num *= 10000;
      if (unit === '億') num *= 100000000;
      return Math.round(num);
    }

    function normalizeText(text) {
      return String(text || '')
        .replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 65248))
        .replace(/[，]/g, ',')
        .replace(/[．]/g, '.')
        .replace(/[Ｋｋ]/g, 'k')
        .replace(/[Ｍｍ]/g, 'm');
    }

    function extractByKeywords(text, keywords) {
      const lines = normalizeText(text).split(/\n+/).map(line => line.trim()).filter(Boolean);
      for (const line of lines) {
        for (const keyword of keywords) {
          if (line.toLowerCase().includes(keyword.toLowerCase())) {
            const match = line.match(/(\d[\d,.]*(?:\.\d+)?\s*[km万億]?)/i);
            if (match) return parseCompactNumber(match[1]);
          }
        }
      }
      return null;
    }

    function parseThreads(text) {
      return {
        views: extractByKeywords(text, ['表示', '閲覧', 'view', 'views']),
        likes: extractByKeywords(text, ['いいね', 'like', 'likes']),
        replies: extractByKeywords(text, ['返信', 'reply', 'replies']),
        reposts: extractByKeywords(text, ['リポスト', 'repost', 'reposts', '再投稿']),
        quotes: extractByKeywords(text, ['引用', 'quote', 'quotes']),
        follows: extractByKeywords(text, ['フォロー', 'follows', 'followers']),
        profileVisits: extractByKeywords(text, ['プロフィール', 'profile']),
        linkClicks: extractByKeywords(text, ['リンク', 'click', 'clicks'])
      };
    }

    function parseInstagram(text) {
      return {
        views: extractByKeywords(text, ['リーチ', 'reach', '閲覧', 'view', 'views']),
        likes: extractByKeywords(text, ['いいね', 'like', 'likes']),
        replies: extractByKeywords(text, ['コメント', 'comment', 'comments', '返信']),
        shares: extractByKeywords(text, ['シェア', 'share', 'shares']),
        bookmarks: extractByKeywords(text, ['保存', 'save', 'saves', 'bookmark']),
        profileVisits: extractByKeywords(text, ['プロフィール', 'profile']),
        follows: extractByKeywords(text, ['フォロー', 'follows', 'followers']),
        linkClicks: extractByKeywords(text, ['リンク', 'click', 'website'])
      };
    }

    function parseX(text) {
      return {
        views: extractByKeywords(text, ['表示', 'impression', 'impressions', 'view', 'views']),
        likes: extractByKeywords(text, ['いいね', 'like', 'likes']),
        replies: extractByKeywords(text, ['返信', 'reply', 'replies']),
        reposts: extractByKeywords(text, ['リポスト', 'repost', 'reposts']),
        bookmarks: extractByKeywords(text, ['ブックマーク', 'bookmark', 'bookmarks', '保存']),
        profileVisits: extractByKeywords(text, ['プロフィール', 'profile']),
        follows: extractByKeywords(text, ['フォロー', 'follows', 'followers']),
        linkClicks: extractByKeywords(text, ['リンク', 'url', 'click', 'clicks'])
      };
    }

    function parseBySns(sns, text) {
      if (sns === 'Threads') return parseThreads(text);
      if (sns === 'Instagram') return parseInstagram(text);
      return parseX(text);
    }

    function renderFields(values) {
      const entries = Object.entries(FIELD_LABELS);
      fields.innerHTML = entries.map(([key, label]) => {
        const value = values[key] ?? '';
        return `
          <div class="field">
            <div class="field-name">${label}</div>
            <input class="field-input" data-field="${key}" type="number" inputmode="numeric" placeholder="未確定" value="${value === null ? '' : value}" />
            <div class="field-help">OCRで自動抽出した候補です。必要ならここで修正できます。</div>
          </div>
        `;
      }).join('');
    }

    function resetImageSelection() {
      selectedFile = null;
      preview.classList.remove('active');
      ocrButton.disabled = true;
      setStatus(pickStatus, '', '');
    }

    pickButton.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) {
        resetImageSelection();
        return;
      }
      if (!['image/png', 'image/jpeg', 'image/jpg'].includes(file.type)) {
        resetImageSelection();
        setStatus(pickStatus, '画像形式は PNG / JPG / JPEG のみ対応です。', 'error');
        fileInput.value = '';
        return;
      }
      selectedFile = file;
      previewImage.src = URL.createObjectURL(file);
      previewName.textContent = file.name;
      previewInfo.textContent = `${file.type.replace('image/', '').toUpperCase()} ・ ${formatBytes(file.size)}`;
      preview.classList.add('active');
      ocrButton.disabled = false;
      setStatus(pickStatus, '画像を選択しました。OCRを実行できます。', 'ok');
    });

    ocrButton.addEventListener('click', async () => {
      if (!selectedFile) {
        setStatus(ocrStatus, '先に画像を選択してください。', 'error');
        return;
      }
      setStatus(ocrStatus, 'OCRを実行中です。画像サイズによっては少し時間がかかります。', 'warn');
      ocrButton.disabled = true;
      try {
        const result = await Tesseract.recognize(selectedFile, 'jpn+eng', {
          logger: (m) => {
            if (m.status === 'recognizing text') {
              const progress = Math.round((m.progress || 0) * 100);
              setStatus(ocrStatus, `OCRを実行中です… ${progress}%`, 'warn');
            }
          }
        });
        const text = result && result.data && result.data.text ? result.data.text : '';
        ocrText.value = text.trim();
        const parsed = parseBySns(snsSelect.value, text);
        renderFields(parsed);
        setStatus(ocrStatus, 'OCRが完了しました。候補数値を確認してください。', 'ok');
      } catch (error) {
        setStatus(ocrStatus, 'OCRでエラーが発生しました。画像を変更して再試行してください。', 'error');
      } finally {
        ocrButton.disabled = false;
      }
    });

    parseButton.addEventListener('click', () => {
      const parsed = parseBySns(snsSelect.value, ocrText.value);
      renderFields(parsed);
      setStatus(ocrStatus, 'OCRテキストから候補を再抽出しました。', 'ok');
    });

    renderFields({});

    document.getElementById('toAnalysisButton').addEventListener('click', () => {
      window.location.href = './analysis-result.html';
    });
  </script>
</body>
</html>
