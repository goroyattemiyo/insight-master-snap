<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分析結果 | InsightMasterforAndroid</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #eef4ff;
      --text: #142033;
      --muted: #61708a;
      --primary: #2f6bff;
      --primary-dark: #2157d8;
      --border: #d9e3f7;
      --success: #1f9d61;
      --danger: #c53d3d;
      --warning: #b7791f;
      --shadow: 0 16px 40px rgba(28, 53, 107, 0.12);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f7f9fd 0%, #eef4ff 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px 20px 120px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--primary-dark);
      font-weight: 800;
    }
    .back {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.92);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--primary-dark);
      text-decoration: none;
      font-size: 20px;
    }
    .hero, .card {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }
    .hero { padding: 24px 22px; }
    .card { padding: 18px; }
    .eyebrow {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--primary);
      margin-bottom: 10px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.14;
      letter-spacing: -0.04em;
    }
    .lead, .card-text {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .label {
      font-size: 12px;
      font-weight: 800;
      color: var(--primary-dark);
      margin-bottom: 6px;
    }
    .grid-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #f8fbff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
    }
    .field-name {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .field-input {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      background: white;
    }
    .primary-button, .secondary-button {
      width: 100%;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .primary-button {
      border: none;
      background: linear-gradient(135deg, var(--primary) 0%, #4d86ff 100%);
      color: white;
      box-shadow: 0 18px 30px rgba(47, 107, 255, 0.26);
    }
    .secondary-button {
      border: 1px solid var(--border);
      background: white;
      color: var(--primary-dark);
    }
    .summary-card {
      background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
    }
    .summary-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--primary-dark);
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }
    .summary-text {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.5;
      letter-spacing: -0.02em;
    }
    .bullet-list {
      margin: 0;
      padding-left: 20px;
      color: var(--text);
      line-height: 1.8;
      font-size: 14px;
    }
    .metric-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .metric-card {
      background: #f8fbff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
    }
    .metric-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .metric-value {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .helper {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .status {
      min-height: 20px;
      font-size: 13px;
      font-weight: 700;
    }
    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(520px, calc(100vw - 20px));
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      padding: 10px 18px;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 12px 30px rgba(23, 41, 80, 0.12);
      border: 1px solid rgba(255,255,255,0.8);
    }
    .nav-item { text-align: center; font-size: 12px; color: var(--muted); font-weight: 700; }
    .nav-item.active { color: var(--primary-dark); }
    @media (max-width: 520px) {
      .grid-fields, .metric-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <a class="back" href="./ocr-extract.html" aria-label="OCR画面へ戻る">‹</a>
      <div>InsightMasterforAndroid</div>
    </div>

    <section class="hero">
      <div class="eyebrow">STEP 4</div>
      <h1>数字を、意味のわかる言葉に変えます。</h1>
      <p class="lead">抽出した数値をもとに、結論・良い点・弱い点・次の一手を自動で整理します。完全自動ではなく、参考分析として使える形を目指します。</p>
    </section>

    <section class="card">
      <h2 class="section-title">1. 対象SNS</h2>
      <select id="snsSelect" class="field-input">
        <option value="Threads">Threads</option>
        <option value="Instagram">Instagram</option>
        <option value="X">X</option>
      </select>
    </section>

    <section class="card">
      <h2 class="section-title">2. 数値入力</h2>
      <div class="grid-fields" id="fields"></div>
      <div class="helper" style="margin-top:12px;">OCRから渡された値を想定しています。ここで修正してから分析できます。</div>
    </section>

    <section class="card">
      <button id="analyzeButton" class="primary-button" type="button">分析を生成する</button>
      <div id="analyzeStatus" class="status" style="margin-top:12px;"></div>
    </section>

    <section class="card">
      <h2 class="section-title">3. 主要数値サマリー</h2>
      <div class="metric-row" id="summaryMetrics"></div>
    </section>

    <section class="summary-card">
      <div class="summary-title">結論</div>
      <div id="conclusion" class="summary-text">まだ分析していません。</div>
    </section>

    <section class="card">
      <h2 class="section-title">良い点</h2>
      <ul id="strengths" class="bullet-list">
        <li>分析前です。</li>
      </ul>
    </section>

    <section class="card">
      <h2 class="section-title">弱い点</h2>
      <ul id="weaknesses" class="bullet-list">
        <li>分析前です。</li>
      </ul>
    </section>

    <section class="card">
      <h2 class="section-title">次の一手</h2>
      <ul id="nextActions" class="bullet-list">
        <li>まずは数値を入れて分析してください。</li>
      </ul>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="メインナビゲーション">
    <div class="nav-item active">ホーム</div>
    <a class="nav-item" href="./history.html" style="text-decoration:none;">履歴</a>
    <div class="nav-item">設定</div>
  </nav>

  <script>
    const snsSelect = document.getElementById('snsSelect');
    const analyzeButton = document.getElementById('analyzeButton');
    const analyzeStatus = document.getElementById('analyzeStatus');
    const conclusion = document.getElementById('conclusion');
    const strengths = document.getElementById('strengths');
    const weaknesses = document.getElementById('weaknesses');
    const nextActions = document.getElementById('nextActions');
    const fields = document.getElementById('fields');
    const summaryMetrics = document.getElementById('summaryMetrics');

    const FIELD_DEFS = {
      Threads: ['views', 'likes', 'replies', 'reposts', 'quotes'],
      Instagram: ['views', 'likes', 'replies', 'shares', 'bookmarks'],
      X: ['views', 'likes', 'replies', 'reposts', 'bookmarks']
    };

    const LABELS = {
      views: '表示回数',
      likes: 'いいね',
      replies: '返信',
      reposts: 'リポスト',
      quotes: '引用',
      shares: 'シェア',
      bookmarks: '保存'
    };

    const EXAMPLES = {
      views: 4200,
      likes: 180,
      replies: 24,
      reposts: 18,
      quotes: 9,
      shares: 22,
      bookmarks: 95
    };

    function numberValue(key) {
      const input = document.querySelector(`[data-field="${key}"]`);
      if (!input) return 0;
      const value = Number(input.value || 0);
      return Number.isFinite(value) ? value : 0;
    }

    function createField(key) {
      return `
        <div class="field">
          <div class="field-name">${LABELS[key]}</div>
          <input class="field-input" type="number" inputmode="numeric" data-field="${key}" value="${EXAMPLES[key] || 0}" />
        </div>
      `;
    }

    function renderFields() {
      const active = FIELD_DEFS[snsSelect.value] || [];
      fields.innerHTML = active.map(createField).join('');
      renderSummaryMetrics(active);
    }

    function renderSummaryMetrics(activeKeys) {
      summaryMetrics.innerHTML = activeKeys.slice(0, 3).map((key) => {
        const value = numberValue(key);
        return `
          <div class="metric-card">
            <div class="metric-label">${LABELS[key]}</div>
            <div class="metric-value">${value.toLocaleString('ja-JP')}</div>
          </div>
        `;
      }).join('');
    }

    function rate(value, thresholds) {
      if (value >= thresholds.good) return 'good';
      if (value >= thresholds.mid) return 'mid';
      return 'low';
    }

    function buildAnalysis(sns) {
      const views = numberValue('views');
      const likes = numberValue('likes');
      const replies = numberValue('replies');
      const reposts = numberValue('reposts');
      const quotes = numberValue('quotes');
      const shares = numberValue('shares');
      const bookmarks = numberValue('bookmarks');

      const reactionBase = likes + replies + reposts + quotes + shares + bookmarks;
      const engagementRate = views > 0 ? (reactionBase / views) * 100 : 0;
      const saveRate = views > 0 ? (bookmarks / views) * 100 : 0;
      const shareRate = views > 0 ? ((reposts + shares) / views) * 100 : 0;
      const replyRate = views > 0 ? (replies / views) * 100 : 0;

      const erState = rate(engagementRate, { good: 3, mid: 1 });
      const saveState = rate(saveRate, { good: 1.5, mid: 0.5 });
      const shareState = rate(shareRate, { good: 1.2, mid: 0.4 });
      const replyState = rate(replyRate, { good: 0.7, mid: 0.2 });

      let summary = '';
      if (erState === 'good') {
        summary = '全体として反応が取りやすく、内容が届いている状態です。';
      } else if (erState === 'mid') {
        summary = '反応は出ていますが、もう一段伸ばせる余地があります。';
      } else {
        summary = '表示は取れても反応につながりにくく、改善余地が大きい状態です。';
      }

      const strengthsList = [];
      const weaknessList = [];
      const actionList = [];

      if (views >= 3000) {
        strengthsList.push('表示回数は十分にあり、まず見てもらう入口は作れています。');
      } else {
        weaknessList.push('表示回数がまだ小さく、まずは見つけてもらう工夫が必要です。');
        actionList.push('投稿の冒頭1〜2行を、誰向けかが一瞬で伝わる言葉に変えてみてください。');
      }

      if (saveState === 'good') {
        strengthsList.push('保存されやすく、あとで見返したい価値が伝わっています。');
      } else if (bookmarks > 0 || sns === 'Instagram') {
        weaknessList.push('保存率はまだ伸びしろがあります。情報のまとまり方を見直せそうです。');
        actionList.push('箇条書きやチェックリストの形で、保存したくなるまとめ方を試してください。');
      }

      if (shareState === 'good') {
        strengthsList.push('拡散されやすく、人に渡したくなる内容になっています。');
      } else {
        weaknessList.push('シェアや再投稿はまだ控えめで、他人に渡す理由が弱いかもしれません。');
        actionList.push('「これ、同じ悩みの人に渡したい」と思える一言や結論を強めてください。');
      }

      if (replyState === 'good') {
        strengthsList.push('会話が起きやすく、読み手の反応を引き出せています。');
      } else {
        weaknessList.push('会話のきっかけが少なく、読み手が反応しにくい可能性があります。');
        actionList.push('最後の一文を質問形や共感を促す形にして、返しやすさを上げてください。');
      }

      if (erState === 'good' && saveState !== 'good') {
        actionList.push('今の反応の強さは活かしつつ、保存したくなる具体性を足すとさらに伸びやすいです。');
      }

      if (erState === 'low') {
        actionList.push('投稿全体を変える前に、まずは冒頭の3秒・最初の2行だけを集中して改善するのがおすすめです。');
      }

      if (strengthsList.length === 0) {
        strengthsList.push('大きく崩れているわけではないので、伸びる型を作る余地があります。');
      }
      if (weaknessList.length === 0) {
        weaknessList.push('大きな弱点は見えにくいですが、さらに伸ばすなら保存やシェアの強化が候補です。');
      }
      if (actionList.length === 0) {
        actionList.push('一度に全部変えず、冒頭・構成・締めのどれか一つだけを変えて反応差を見てください。');
      }

      return {
        summary,
        strengthsList,
        weaknessList,
        actionList,
        engagementRate,
        views,
        likes,
        sns
      };
    }

    function renderList(element, items) {
      element.innerHTML = items.map((item) => `<li>${item}</li>`).join('');
    }

    analyzeButton.addEventListener('click', () => {
      const analysis = buildAnalysis(snsSelect.value);
      conclusion.textContent = analysis.summary;
      renderList(strengths, analysis.strengthsList);
      renderList(weaknesses, analysis.weaknessList);
      renderList(nextActions, analysis.actionList);
      analyzeStatus.textContent = `${analysis.sns} の数値をもとに参考分析を生成しました。ER は ${analysis.engagementRate.toFixed(1)}% です。`;
      analyzeStatus.className = 'status';

      // 履歴をlocalStorageに保存
      const historyItem = {
        id: Date.now(),
        date: new Date().toLocaleString('ja-JP'),
        sns: analysis.sns,
        summary: analysis.summary,
        engagementRate: analysis.engagementRate.toFixed(1),
        views: analysis.views,
        likes: analysis.likes
      };
      const history = JSON.parse(localStorage.getItem('analysisHistory') || '[]');
      history.unshift(historyItem);
      if (history.length > 50) history.pop();
      localStorage.setItem('analysisHistory', JSON.stringify(history));
      renderSummaryMetrics(FIELD_DEFS[snsSelect.value]);
    });

    snsSelect.addEventListener('change', renderFields);
    fields.addEventListener('input', () => renderSummaryMetrics(FIELD_DEFS[snsSelect.value]));

    renderFields();

    // sessionStorageから数値とSNSを復元
    const savedSns = sessionStorage.getItem('selectedSns');
    const savedValues = sessionStorage.getItem('ocrValues');
    if (savedSns) snsSelect.value = savedSns;
    if (savedValues) {
      const values = JSON.parse(savedValues);
      renderFields();
      Object.entries(values).forEach(([key, val]) => {
        const input = document.querySelector(`[data-field="${key}"]`);
        if (input) input.value = val;
      });
      renderSummaryMetrics(FIELD_DEFS[snsSelect.value]);
    }
  </script>
</body>
</html>
